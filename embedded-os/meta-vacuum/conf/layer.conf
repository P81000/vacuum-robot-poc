# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-vacuum"
BBFILE_PATTERN_meta-vacuum = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-vacuum = "6"

LAYERDEPENDS_meta-vacuum = "core"
LAYERSERIES_COMPAT_meta-vacuum = "kirkstone"
